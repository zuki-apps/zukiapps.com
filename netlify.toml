[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  SITEMAP_USE_GIT = "true"
  # Note: Add FIREBASE_SERVICE_ACCOUNT_KEY, NEXT_PUBLIC_BASE_URL,
  # NEXT_PUBLIC_GOOGLE_SITE_VERIFICATION, and NEXT_PUBLIC_GA_MEASUREMENT_ID in Netlify Dashboard

# Next.js hashed assets — long-lived immutable cache
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Logos — 1 week + long SWR (versioned via new deploy; no content hash in filename)
[[headers]]
  for = "/logo.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

[[headers]]
  for = "/logo.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, stale-while-revalidate=2592000"

# Next.js image-optimisation endpoint — parameters act as cache key, safe to cache long
[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=31536000"

# Static app icons and screenshots — 1-year immutable cache (cache-bust via ?v=N)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# llms.txt and faq.md — allow crawlers to cache for 1 day
[[headers]]
  for = "/*"
  [headers.values]
    Vary = "Accept-Language"

[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*/faq.md"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# app-ads.txt (AdMob / IAB): plain text + correct MIME for crawlers
[[headers]]
  for = "/app-ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Continuous Deployment - Netlify will automatically pull and deploy on every git push
[build.processing]
  skip_processing = false

