[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # Note: Add FIREBASE_SERVICE_ACCOUNT_KEY and NEXT_PUBLIC_BASE_URL in Netlify Dashboard
  # Site settings → Environment variables

# Static app icons and screenshots — 1-year immutable cache (cache-bust via ?v=N)
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# llms.txt and faq.md — allow crawlers to cache for 1 day
[[headers]]
  for = "/llms.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*/faq.md"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# app-ads.txt (AdMob / IAB): plain text + correct MIME for crawlers
[[headers]]
  for = "/app-ads.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"

# Continuous Deployment - Netlify will automatically pull and deploy on every git push
[build.processing]
  skip_processing = false

