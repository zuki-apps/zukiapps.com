[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  # Note: Add FIREBASE_SERVICE_ACCOUNT_KEY and NEXT_PUBLIC_BASE_URL in Netlify Dashboard
  # Site settings → Environment variables

# Continuous Deployment - Netlify will automatically pull and deploy on every git push
[build.processing]
  skip_processing = false

