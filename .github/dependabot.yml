version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      next:
        patterns:
          - next
          - eslint-config-next
      types:
        patterns:
          - "@types/*"
    ignore:
      # Stay on Next 14 until a deliberate App Router / OpenNext migration (Next 16 needs ESLint 9+).
      - dependency-name: next
        versions: [">=15.0.0"]
      - dependency-name: eslint-config-next
        versions: [">=15.0.0"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
