# Runs on push to main when SITE_URL is set in repository secrets.
# CI runs in .github/workflows/ci.yml (mirrors bitbucket-pipelines.yml ci:full).

name: Ping sitemap on push

on:
  push:
    branches: [ main, master ]

jobs:
  ping-sitemap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Ping Google with sitemap
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL not set in secrets, skipping ping"
            exit 0
          fi
          SITEMAP_URL="$SITE_URL/sitemap.xml"
          echo "Pinging sitemap: $SITEMAP_URL"
          curl -m 15 -sS "https://www.google.com/ping?sitemap=$SITEMAP_URL" || true
          curl -m 15 -sS "https://www.bing.com/webmaster/ping.aspx?siteMap=$SITEMAP_URL" || true
