name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: "0"
  CI: "true"
  NEXT_PUBLIC_SITE_URL: https://zukiapps.com
  NEXT_PUBLIC_BASE_URL: https://zukiapps.com

jobs:
  check:
    name: Typecheck, lint, static export smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          node --version
          npm --version
          test -s package-lock.json
          npm install --include=dev --no-audit --no-fund

      - name: Prepare TypeScript
        run: |
          if [ ! -f next-env.d.ts ]; then
            printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts
          fi

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build:static
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          SITEMAP_USE_GIT: "true"

      - name: Verify export artifact size
        run: |
          set -euo pipefail
          FILE_COUNT=$(find out -type f | wc -l | tr -d ' ')
          HTML_COUNT=$(find out -name '*.html' | wc -l | tr -d ' ')
          echo "Export: ${FILE_COUNT} files, ${HTML_COUNT} HTML"
          test "$FILE_COUNT" -gt 2000
          test "$HTML_COUNT" -gt 800

      - name: Static export smoke (all sitemap routes)
        run: npm run smoke:static

      - name: Routing summary
        if: success()
        run: |
          SITEMAP_COUNT=$(grep -c '<loc>' out/sitemap.xml)
          HTML_COUNT=$(find out -name '*.html' | wc -l | tr -d ' ')
          echo "### Static export routing" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sitemap URLs verified: **${SITEMAP_COUNT}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- HTML files: **${HTML_COUNT}**" >> "$GITHUB_STEP_SUMMARY"
          echo "- Local HTTP: all sitemap paths returned 200" >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy to Cloudflare Pages
    needs: check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          test -s package-lock.json
          npm install --include=dev --no-audit --no-fund

      - name: Build static export
        run: npm run build:static
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          SITEMAP_USE_GIT: "true"

      - name: Verify export artifact size
        run: |
          set -euo pipefail
          FILE_COUNT=$(find out -type f | wc -l | tr -d ' ')
          HTML_COUNT=$(find out -name '*.html' | wc -l | tr -d ' ')
          echo "Export: ${FILE_COUNT} files, ${HTML_COUNT} HTML"
          test "$FILE_COUNT" -gt 2000
          test "$HTML_COUNT" -gt 800

      - name: Static export smoke (pre-deploy)
        run: npm run smoke:static

      - name: Verify Cloudflare secrets
        run: |
          set -euo pipefail
          if [ -z "${CLOUDFLARE_API_TOKEN:-}" ]; then
            echo "::error::CLOUDFLARE_API_TOKEN GitHub secret is missing or empty"
            exit 1
          fi
          if [ -z "${CLOUDFLARE_ACCOUNT_ID:-}" ]; then
            echo "::error::CLOUDFLARE_ACCOUNT_ID GitHub secret is missing or empty"
            exit 1
          fi
          curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success'), d.get('errors', d); print('Pages API OK')"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Hide Worker wrangler config (Pages deploy only)
        run: test -f wrangler.jsonc && mv wrangler.jsonc wrangler.jsonc.worker.disabled || true

      - name: Ensure Cloudflare Pages project
        run: npx wrangler pages project create zukiapps-site --production-branch=main --config wrangler.pages.jsonc || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          set -euxo pipefail
          npx wrangler pages deploy out \
            --project-name=zukiapps-site \
            --branch=main \
            --skip-caching \
            --commit-hash="${{ github.sha }}" \
            --commit-message="CI deploy ${{ github.sha }}" \
            2>&1 | tee deploy.log
          node scripts/verify-deploy-log.mjs deploy.log
          echo "Deployed to https://zukiapps-site.pages.dev" >> "$GITHUB_STEP_SUMMARY"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload deploy log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pages-deploy-log
          path: deploy.log
          if-no-files-found: ignore

      - name: Attach custom domains
        run: node scripts/pages-deploy.mjs --domains-only
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy smoke (all routes on pages.dev)
        run: |
          sleep 15
          npm run smoke:live

      - name: Restore Worker wrangler config
        if: always()
        run: test -f wrangler.jsonc.worker.disabled && mv wrangler.jsonc.worker.disabled wrangler.jsonc || true
