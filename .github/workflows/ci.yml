name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: "0"
  CI: "true"
  NODE_ENV: development
  NEXT_PUBLIC_SITE_URL: https://zukiapps.com
  NEXT_PUBLIC_BASE_URL: https://zukiapps.com

jobs:
  check:
    name: Typecheck, lint, build, sitemap smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          node --version
          npm --version
          test -s package-lock.json
          npm install --no-audit --no-fund

      - name: Prepare TypeScript
        run: |
          if [ ! -f next-env.d.ts ]; then
            printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts
          fi

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=6144

      - name: Sitemap smoke
        run: npm run smoke:sitemap
        env:
          NODE_OPTIONS: --max-old-space-size=6144

  deploy:
    name: Deploy to Cloudflare Workers
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          test -s package-lock.json
          npm install --no-audit --no-fund

      - name: Deploy
        shell: bash
        run: npm run deploy
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          WRANGLER_BUILD_PLATFORM: node
          WRANGLER_BUILD_CONDITIONS: ""
          NEXT_PUBLIC_SITE_URL: https://zukiapps.com
          NEXT_PUBLIC_BASE_URL: https://zukiapps.com
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          SITEMAP_USE_GIT: "true"
