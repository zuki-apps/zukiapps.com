name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HUSKY: "0"
  CI: "true"
  NEXT_PUBLIC_SITE_URL: https://zukiapps.com
  NEXT_PUBLIC_BASE_URL: https://zukiapps.com

jobs:
  check:
    name: Typecheck, lint, static export smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          node --version
          npm --version
          test -s package-lock.json
          npm install --include=dev --no-audit --no-fund

      - name: Prepare TypeScript
        run: |
          if [ ! -f next-env.d.ts ]; then
            printf '/// <reference types="next" />\n/// <reference types="next/image-types/global" />\n' > next-env.d.ts
          fi

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build:static
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          SITEMAP_USE_GIT: "true"

      - name: Static export smoke
        run: npm run smoke:static

  deploy:
    name: Deploy to Cloudflare Pages
    needs: check
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          test -s package-lock.json
          npm install --include=dev --no-audit --no-fund

      - name: Build static export
        run: npm run build:static
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          SITEMAP_USE_GIT: "true"

      - name: Hide Worker wrangler config (Pages deploy only)
        run: test -f wrangler.jsonc && mv wrangler.jsonc wrangler.jsonc.worker.disabled || true

      - name: Ensure Cloudflare Pages project
        run: npx wrangler pages project create zukiapps-site --production-branch=main --config wrangler.pages.jsonc || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=zukiapps-site --branch=main --config wrangler.pages.jsonc --commit-dirty=true

      - name: Attach custom domains
        run: node scripts/pages-deploy.mjs --domains-only
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Restore Worker wrangler config
        if: always()
        run: test -f wrangler.jsonc.worker.disabled && mv wrangler.jsonc.worker.disabled wrangler.jsonc || true
