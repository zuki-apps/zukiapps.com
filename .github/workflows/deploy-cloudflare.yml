name: Deploy Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      HUSKY: "0"
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          node --version
          npm --version
          test -s package-lock.json
          npm install --include=dev --no-audit --no-fund

      - name: Build static export
        run: npm run build:static
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          SITEMAP_USE_GIT: "true"

      - name: Hide Worker wrangler config (Pages deploy only)
        run: test -f wrangler.jsonc && mv wrangler.jsonc wrangler.jsonc.worker.disabled || true

      - name: Ensure Cloudflare Pages project
        run: npx wrangler pages project create zukiapps-site --production-branch=main --config wrangler.pages.jsonc || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=zukiapps-site --branch=main --config wrangler.pages.jsonc --commit-dirty=true

      - name: Attach custom domains
        run: node scripts/pages-deploy.mjs --domains-only
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Restore Worker wrangler config
        if: always()
        run: test -f wrangler.jsonc.worker.disabled && mv wrangler.jsonc.worker.disabled wrangler.jsonc || true
