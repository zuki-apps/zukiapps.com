name: Deploy Cloudflare

on:
  workflow_dispatch:

concurrency:
  group: deploy-cloudflare
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      HUSKY: "0"
      CI: "true"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        shell: bash
        run: |
          set -euxo pipefail
          node --version
          npm --version
          test -s package-lock.json
          npm install --include=dev --no-audit --no-fund

      - name: Build static export
        run: npm run build:static
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          NEXT_PUBLIC_GA_MEASUREMENT_ID: ${{ secrets.NEXT_PUBLIC_GA_MEASUREMENT_ID }}
          SITEMAP_USE_GIT: "true"

      - name: Verify Cloudflare secrets
        run: |
          set -euo pipefail
          test -n "${CLOUDFLARE_API_TOKEN:-}" || { echo "::error::CLOUDFLARE_API_TOKEN missing"; exit 1; }
          test -n "${CLOUDFLARE_ACCOUNT_ID:-}" || { echo "::error::CLOUDFLARE_ACCOUNT_ID missing"; exit 1; }
          curl -sf -H "Authorization: Bearer ${CLOUDFLARE_API_TOKEN}" \
            "https://api.cloudflare.com/client/v4/accounts/${CLOUDFLARE_ACCOUNT_ID}/pages/projects" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); assert d.get('success'), d.get('errors', d)"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Hide Worker wrangler config (Pages deploy only)
        run: test -f wrangler.jsonc && mv wrangler.jsonc wrangler.jsonc.worker.disabled || true

      - name: Ensure Cloudflare Pages project
        run: npx wrangler pages project create zukiapps-site --production-branch=main || true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Deploy to Cloudflare Pages
        run: |
          set -euxo pipefail
          npx wrangler pages deploy out --project-name=zukiapps-site --branch=main --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Attach custom domains
        run: node scripts/pages-deploy.mjs --domains-only
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Restore Worker wrangler config
        if: always()
        run: test -f wrangler.jsonc.worker.disabled && mv wrangler.jsonc.worker.disabled wrangler.jsonc || true
